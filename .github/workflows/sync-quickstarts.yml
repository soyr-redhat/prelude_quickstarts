name: Sync Quickstarts to RHOAI Cluster Pool

on:
  push:
    branches:
      - main
    paths:
      - 'active/*.yaml'
      - 'active/*.yml'

jobs:
  sync-to-cluster-pool:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prelude_quickstarts repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout rhoai-cluster-pool fork
        uses: actions/checkout@v4
        with:
          repository: soyr-redhat/rhoai-cluster-pool
          token: ${{ secrets.RHOAI_CLUSTER_POOL_PAT }}
          path: rhoai-cluster-pool
          fetch-depth: 0

      - name: Sync fork with upstream
        run: |
          cd rhoai-cluster-pool
          git remote add upstream https://github.com/eformat/rhoai-cluster-pool.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || echo "Already up to date"
          git push origin main

      - name: Get changed quickstart files
        id: changed-files
        run: |
          # Get list of changed YAML files in active directory
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^active/.*\.ya*ml$' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No quickstart files changed in active/ directory"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files in active/:"
          echo "$CHANGED_FILES"

          # Save to output
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Copy quickstarts and update kustomization
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          # Set target directory
          TARGET_DIR="rhoai-cluster-pool/applications/quickstarts/input-prelude"

          # Copy changed files
          echo "Copying quickstart files..."
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              filename=$(basename "$file")
              echo "Copying $file to $TARGET_DIR/$filename"
              cp "$file" "$TARGET_DIR/$filename"
            fi
          done <<< "${{ steps.changed-files.outputs.files }}"

          # Update kustomization.yaml
          cd "$TARGET_DIR"

          # Get all quickstart YAML files (excluding kustomization.yaml)
          QUICKSTART_FILES=$(ls -1 prelude-*.yaml prelude-*.yml 2>/dev/null | sort || true)

          if [ -z "$QUICKSTART_FILES" ]; then
            echo "No quickstart files found"
            exit 1
          fi

          # Generate new kustomization.yaml
          cat > kustomization.yaml <<EOF
          ---
          resources:
          EOF

          # Add each file as a resource
          while IFS= read -r file; do
            echo "  - $file" >> kustomization.yaml
          done <<< "$QUICKSTART_FILES"

          echo "Updated kustomization.yaml:"
          cat kustomization.yaml

      - name: Commit and push changes to fork
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          cd rhoai-cluster-pool

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create new branch
          BRANCH_NAME="quickstart-sync-${{ github.run_number }}"
          git checkout -b "$BRANCH_NAME"

          # Stage and commit changes
          git add applications/quickstarts/input-prelude/
          git commit -m "Add/Update Prelude quickstarts

          Auto-synced from prelude_quickstarts repo

          Changed files:
          ${{ steps.changed-files.outputs.files }}"

          # Push to fork
          git push origin "$BRANCH_NAME"

          # Save branch name for next step
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        id: commit-push

      - name: Create Pull Request to upstream
        if: steps.changed-files.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.RHOAI_CLUSTER_POOL_PAT }}
        run: |
          gh pr create \
            --repo eformat/rhoai-cluster-pool \
            --head soyr-redhat:${{ steps.commit-push.outputs.branch_name }} \
            --title '[Auto] Sync Prelude Quickstarts' \
            --body '## 🚀 Automated Quickstart Sync

          This PR was automatically created by the prelude_quickstarts repository.

          ### Changed Files
          ```
          ${{ steps.changed-files.outputs.files }}
          ```

          ### What this does
          - Syncs new/updated quickstart YAML files from `prelude_quickstarts/active/`
          - Updates `applications/quickstarts/input-prelude/kustomization.yaml` to include all quickstarts

          ### Review Checklist
          - [ ] Quickstart YAML is valid
          - [ ] Naming follows convention: `prelude-X-topic.yaml`
          - [ ] displayName follows pattern: `Prelude -X- Title`
          - [ ] Tasks are clear and actionable
          - [ ] Prerequisites are listed
          - [ ] Review/verification steps included

          **Source:** ${{ github.event.head_commit.message }}
          **Commit:** ${{ github.sha }}

          ---
          *This PR was created automatically. Review and merge when ready.*'
